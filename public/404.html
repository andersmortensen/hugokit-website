<script>
  document.documentElement.classList.add('js');
  (function () {
    var conn = navigator.connection;
    if (conn && (conn.saveData || /(^|-)2g$/.test(conn.effectiveType || ''))) return;
    var warmed = {};
    var warm = function (a) {
      if (!a || !a.href || a.hasAttribute('download') || a.target) return;
      var u;
      try { u = new URL(a.href); } catch (e) { return; }
      if (u.origin !== location.origin) return;
      if (u.pathname === location.pathname || warmed[u.href]) return;
      warmed[u.href] = 1;
      fetch(u.href, { credentials: 'same-origin' }).catch(function () {});
    };
    ['mouseover', 'focusin', 'touchstart'].forEach(function (ev) {
      document.addEventListener(ev, function (e) {
        var a = e.target && e.target.closest && e.target.closest('a[href]');
        if (a) warm(a);
      }, { passive: true, capture: true });
    });
  })();

  addEventListener('DOMContentLoaded', function () {
    var all = document.querySelectorAll('.reveal');
    if (matchMedia('(prefers-reduced-motion: reduce)').matches || !('IntersectionObserver' in window)) {
      all.forEach(function (el) { el.classList.add('in'); });
      return;
    }
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
      });
    }, { rootMargin: '0px 0px -8% 0px', threshold: 0.08 });
    all.forEach(function (el) { io.observe(el); });

    
    
    var syncPics = function (mode) {
      document.querySelectorAll('picture.mode-pic source').forEach(function (s) {
        s.media = mode === 'dark' ? 'all' : 'not all';
      });
    };
    if (document.documentElement.dataset.theme) syncPics(document.documentElement.dataset.theme);

    var mt = document.querySelector('.mode-toggle');
    if (mt) mt.addEventListener('click', function () {
      var apply = function () {
        var root = document.documentElement;
        var cur = root.dataset.theme;
        var sysDark = matchMedia('(prefers-color-scheme: dark)').matches;
        var next = cur ? (cur === 'dark' ? 'light' : 'dark') : (sysDark ? 'light' : 'dark');
        root.dataset.theme = next;
        try { localStorage.setItem('hk-theme', next); } catch (e) {}
        var c = next === 'dark' ? '#060607' : '#E2DFE7';
        document.querySelectorAll('meta[name="theme-color"]').forEach(function (m) { m.content = c; });
        syncPics(next);
      };
      
      if (document.startViewTransition && !matchMedia('(prefers-reduced-motion: reduce)').matches) {
        document.startViewTransition(apply);
      } else {
        apply();
      }
    });

    
    var g = document.getElementById('giant');
    if (g) {
      var text = g.textContent;
      g.textContent = '';
      text.split('').forEach(function (ch, i) {
        var s = document.createElement('span');
        s.className = 'gl';
        s.style.setProperty('--gi', i);
        s.textContent = ch;
        g.appendChild(s);
      });
      g.classList.add('split');
      var fit = function () {
        var w = g.parentElement.clientWidth;
        g.style.fontSize = '100px';
        var natural = g.getBoundingClientRect().width;
        if (natural > 0 && w > 0) g.style.fontSize = (100 * w / natural) + 'px';
      };
      addEventListener('resize', fit);
      if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
      fit();
    }
  });
</script>

  </p>
  <div class="consent-actions">
    <button class="btn-outline btn-sm" type="button" data-consent="denied">Decline</button>
    <button class="btn btn-sm" type="button" data-consent="granted">Accept</button>

<script>
  (function () {
    var el = document.getElementById('consent');
    if (!el) return;

    var stored = null;
    try { stored = localStorage.getItem('hk-consent'); } catch (e) {}

    
    
    
    if (stored !== 'granted' && stored !== 'denied') el.hidden = false;

    
    
    
    var clearGa = function () {
      document.cookie.split(';').forEach(function (c) {
        var name = c.split('=')[0].trim();
        if (name.indexOf('_ga') !== 0) return;
        document.cookie = name + '=; Max-Age=0; path=/';
        document.cookie = name + '=; Max-Age=0; path=/; domain=' + location.hostname;
        document.cookie = name + '=; Max-Age=0; path=/; domain=.' + location.hostname;
      });
    };

    
    document.addEventListener('click', function (e) {
      if (!e.target.closest('[data-consent-reopen]')) return;
      el.hidden = false;
      var first = el.querySelector('button[data-consent]');
      if (first) first.focus();
    });

    el.addEventListener('click', function (e) {
      var b = e.target.closest('button[data-consent]');
      if (!b) return;
      var choice = b.dataset.consent;

      try { localStorage.setItem('hk-consent', choice); } catch (e) {}

      if (typeof gtag === 'function') {
        gtag('consent', 'update', {
          analytics_storage: choice === 'granted' ? 'granted' : 'denied'
        });
      }
      if (choice === 'denied') clearGa();

      el.hidden = true;
    });
  })();
</script>

  
<script>
  (function () {
    var VERSION  = "0.1.0";
    var DOWNLOAD = "https://github.com/andersmortensen/hugokit/releases/latest/download/HugoKit.dmg";

    var track = function (name, params) {
      if (typeof gtag !== 'function') return;
      gtag('event', name, params || {});
    };
    var placeOf = function (a) {
      if (a.closest('.site-footer')) return 'footer';
      if (a.closest('.doc-foot'))    return 'docs_page';
      if (a.closest('.site-nav'))    return 'nav';
      if (a.closest('.get'))         return 'download_section';
      if (a.closest('.hero'))        return 'hero';
      return 'other';
    };
    document.addEventListener('click', function (e) {
      var a = e.target.closest && e.target.closest('a[href]');
      if (!a) return;

      
      
      if (a.href === DOWNLOAD) {
        track('download_started', {
          app_version: VERSION,
          placement: placeOf(a)
        });
        return;
      }

      
      
      
      if (a.getAttribute('href') && a.getAttribute('href').indexOf('#download') !== -1) {
        var panel = a.closest('.loop-panel');
        var loc = 'other';
        if (a.closest('.site-nav')) {
          loc = 'nav';
        } else if (a.closest('.hero')) {
          loc = 'hero';
        } else if (panel) {
          var m = panel.className.match(/loop-panel-(\d+)/);
          loc = m ? 'loop_0' + (parseInt(m[1], 10) + 1) : 'loop';
        }
        track('cta_download_click', { location: loc });
        return;
      }

      
      
      if (a.protocol === 'mailto:') {
        track('feedback_click', { location: placeOf(a) });
        return;
      }

      
      if (a.hostname === 'github.com') {
        track('github_click', { location: placeOf(a) });
      }
    }, { passive: true });
    document.addEventListener('change', function (e) {
      var t = e.target;
      if (!t || t.name !== 'loop-tab' || !t.checked) return;
      var lab = document.querySelector('label[for="' + t.id + '"]');
      var idx = parseInt((t.id.match(/loop-t(\d+)/) || [])[1], 10);
      track('loop_tab_changed', {
        
        tab_name: lab ? lab.textContent.replace(/^\s*0\d\s*/, '').trim() : t.id,
        tab_index: isNaN(idx) ? 0 : idx + 1
      });
    });
    document.querySelectorAll('details.faq-item').forEach(function (d) {
      d.addEventListener('toggle', function () {
        if (!d.open) return;
        var q = d.querySelector('.faq-q');
        track('faq_opened', { question: q ? q.textContent.trim() : '' });
      });
    });
    var get = document.getElementById('download');
    if (get && 'IntersectionObserver' in window) {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (en) {
          if (!en.isIntersecting) return;
          io.disconnect();
          track('download_section_view');
        });
      }, { threshold: 0.5 });
      io.observe(get);
    }
    var root = document.documentElement;
    new MutationObserver(function () {
      track('mode_toggled', { mode: root.dataset.theme || 'system' });
    }).observe(root, { attributeFilter: ['data-theme'] });
    if (document.querySelector('main.notfound')) {
      track('page_not_found', {
        bad_path: location.pathname,
        referrer: document.referrer || '(direct)'
      });
    }
  })();
</script>
