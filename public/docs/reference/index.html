  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var isDark = saved === 'dark' || (saved !== 'light' && prefersDark);
      if (saved) document.documentElement.setAttribute('data-theme', saved);
      if (isDark) document.documentElement.classList.add('dark-active');
    })();

    

    (function() {
      var html = document.documentElement;
      if (!html.classList.contains('is-splashing')) return;

      var STORAGE_KEY = 'hk-splash-seen';
      var alreadySeen = false;
      try { alreadySeen = sessionStorage.getItem(STORAGE_KEY) === '1'; } catch (e) {}

      var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      if (alreadySeen || reduceMotion) {
         
        html.classList.remove('is-splashing');
        return;
      }

      function release() {
        

        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            html.classList.remove('is-splashing');
            try { sessionStorage.setItem(STORAGE_KEY, '1'); } catch (e) {}
          });
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', release, { once: true });
      } else {
        release();
      }
    })();
  </script>
