baseURL = 'https://hugokit.com/'
languageCode = 'en'
title = 'HugoKit'
timeZone = 'Europe/Copenhagen'
# Sitets layouts/assets bor i temaet — roden ejer kun content, config og static.
theme = 'hugokit'
# 'section' er aktiv igen: /changelog/ er en rigtig Hugo-sektion (Sparkle-kontrakten).
# RSS er aktivt (fjernet fra disableKinds 2026-07-16): docs og changelog får
# /docs/index.xml og /changelog/index.xml via Hugos indbyggede template, og
# head.html udstiller dem som <link rel="alternate">. Forsiden får IKKE et feed
# (dens outputs er overstyret til html+llms nedenfor). _skabelon.md er draft og
# holdes dermed ude. Appcast'en (Sparkle) er urørt af dette – separat fil i static/.
disableKinds = ['taxonomy', 'term']
# Git-commit-datoen bliver sidens .Lastmod (Hugos lastmod-default har ':git' først).
# Docs' JSON-LD (TechArticle → dateModified) læser den – ingen dato i front matter,
# ingen dato der kan drive fra virkeligheden. Rollback: slet denne linje.
enableGitInfo = true
copyright = '2026'

[frontmatter]
  # Faldkæde for .Lastmod: git-commit-datoen først, så en eksplicit lastmod i
  # front matter, og til sidst filens mtime – ellers står en nyskrevet, endnu
  # ucommittet docs-side uden dato indtil den bliver committet.
  lastmod = [':git', 'lastmod', ':fileModTime', 'date']

# llms.txt genereres ved HVER build – ikke en håndholdt fil i static/.
# Formatet defineres her, forsiden får det som ekstra output, og templaten
# (themes/hugokit/layouts/home.llms.txt) bygger docs-listen fra content/docs/.
# En ny docs-side dukker dermed op i llms.txt af sig selv. Verificér: /llms.txt
[outputFormats]
  [outputFormats.llms]
    mediaType = 'text/plain'
    baseName = 'llms'
    isPlainText = true
    # Ikke et alternativt view af forsiden – skal aldrig i <link rel=alternate>.
    notAlternative = true

  # Markdown-udgaven af hver side: /docs/preflight/index.md ved siden af HTML'en.
  # Til AI-crawlere og til folk der bare vil have kilden. Templaten er
  # themes/hugokit/layouts/page.md, og head.html udstiller den som
  # <link rel="alternate" type="text/markdown"> – derfor IKKE notAlternative.
  [outputFormats.md]
    mediaType = 'text/markdown'
    baseName = 'index'
    isPlainText = true
    permalinkable = false

  # Chrome-less render of changelog release notes for Sparkle's update WebView.
  # Sparkle does not run the page's ?in-app JavaScript, so the chrome can't be
  # stripped client-side; this renders a JS-free /changelog/<v>/in-app.html with
  # class="in-app" baked in server-side (layout: changelog/page.inapp.html). The
  # appcast's releaseNotesLink points here. Enabled per changelog page in front
  # matter, so it never renders for docs pages.
  [outputFormats.inapp]
    mediaType = 'text/html'
    baseName = 'in-app'
    isHTML = true
    notAlternative = true

[outputs]
  home = ['html', 'llms']
  # Gælder alle enkeltsider – docs og changelog. Sektionsforsider beholder
  # Hugos default (kun html).
  page = ['html', 'md']

[markup]
  [markup.highlight]
    # Kodeblokke rendres som ren monospace i sitets egne farver. Chromas
    # syntax-styles er bundet til ét farveskema ad gangen og ville låse
    # kodeblokkene til enten light eller dark — begge skal virke.
    codeFences = false

[params]
  # Tagline — bruges i forsidens <title> (SERP) sammen med sitets navn.
  tagline = 'a Mac app for Hugo'
  description = 'A Mac app for Hugo: run the server, preview your pages and publish your site from one window. Free, native, no terminal – built by one person for his own sites.'
  # Appens aktuelle version — bruges i JSON-LD (softwareVersion); bump ved release.
  version = '0.2.0'
  # Download-fakta under knappen. Skal matche den DMG appcast'en peger på —
  # størrelsen er enclosure length i static/appcast.xml (7.115.242 B = 6,8 MB),
  # datoen er dens pubDate, og arkitekturen er aflæst på binæren i dist/export
  # (Mach-O universal: x86_64 + arm64). Bumpes ved hver release, se RELEASING.md.
  dmgSize = '6.8 MB'
  releaseDate = '2026-07-23'
  architecture = 'Universal – Apple silicon and Intel'
  requires = 'macOS 26 or later'
  # Kort form til bezel-barens app-fakta – følg `requires` ved ændringer.
  requiresShort = 'macOS 26+'
  # GA4 measurement ID — gtag indsættes kun i production-builds (se head.html).
  googleAnalyticsID = 'G-5MFTKS6PH9'
  # DMG'en hostes som asset på det offentlige repos releases (se RELEASING.md).
  # Kræver at hver release har en asset med det faste navn HugoKit.dmg.
  downloadURL = 'https://github.com/andersmortensen/hugokit/releases/latest/download/HugoKit.dmg'
  # Offentligt repo (releases/downloads). Kildekoden bor i hugokit-source, som ALDRIG linkes.
  githubURL = 'https://github.com/andersmortensen/hugokit'
  feedbackEmail = 'hello@hugokit.com'
