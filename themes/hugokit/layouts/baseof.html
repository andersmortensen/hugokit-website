<!doctype html>
<html lang="{{ site.Language.LanguageCode }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  {{ partial "bezel.html" . }}
  {{ block "body" . }}{{ end }}
  {{- /* Both last in the body: the DOM is parsed, so tracking and banner can bind
        directly without waiting for DOMContentLoaded. */}}
  {{ partial "consent.html" . }}
  {{ partial "analytics.html" . }}
</body>
</html>
