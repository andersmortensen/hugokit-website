{{- /* The hero video: looping app recording in light/dark, same geometry as
      the app screenshots (1072×764 – window frame and shadow are composed into
      the file, so the .shot rules apply unchanged).

      <video> cannot pick its source by color scheme the way <picture> can (media on
      <source> is ignored in video). The element therefore stands without sources in the markup,
      and the script just below inserts them for the mode that actually applies – one
      set is loaded, never both. Same truth as .mode-pic: data-theme (the
      manual toggle) wins over the system's prefers-color-scheme.

      prefers-reduced-motion: no autoplay, no video download – the poster frame
      stands as a still image (the same first frame the clip starts on).

      Without JS: <noscript> falls back to the static screenshot.

      Params: v (dict with sources + posters) · alt · light/dark (noscript fallback) */ -}}
{{- $v := .v }}{{ $alt := .alt }}
{{- /* The mp4s are fingerprinted (source: assets/video/) so the filename changes when
      the bytes do – that makes the immutable cache in .htaccess safe. The posters remain
      in static/ (small, rarely changed; host-default cache). */ -}}
{{- $lightMp4 := (resources.Get (strings.TrimPrefix "/" $v.lightMp4) | fingerprint).RelPermalink }}
{{- $darkMp4 := (resources.Get (strings.TrimPrefix "/" $v.darkMp4) | fingerprint).RelPermalink }}
<video class="shot hero-vid" id="hero-video"
       width="1072" height="764"
       muted loop playsinline autoplay preload="auto"
       poster="{{ $v.posterLight | relURL }}"
       aria-label="{{ $alt }}"
       data-light-mp4="{{ $lightMp4 }}"
       data-dark-mp4="{{ $darkMp4 }}"
       data-poster-light="{{ $v.posterLight | relURL }}"
       data-poster-dark="{{ $v.posterDark | relURL }}"></video>
<script>
  (function () {
    var v = document.getElementById('hero-video');
    if (!v) return;
    var root = document.documentElement;
    var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

    var isDark = function () {
      return root.dataset.theme
        ? root.dataset.theme === 'dark'
        : matchMedia('(prefers-color-scheme: dark)').matches;
    };

    var apply = function () {
      var dark = isDark();
      v.poster = dark ? v.dataset.posterDark : v.dataset.posterLight;
      if (reduce) return; // still image – never fetch the video
      var src = dark ? v.dataset.darkMp4 : v.dataset.lightMp4;
      if (v.dataset.current === src) return;
      v.dataset.current = src;
      v.innerHTML = '';
      var s = document.createElement('source');
      s.type = 'video/mp4';
      s.src = src;
      v.appendChild(s);
      v.load();
      var p = v.play();
      if (p && p.catch) p.catch(function () {});
    };

    if (reduce) {
      v.removeAttribute('autoplay');
      v.preload = 'none';
    }
    apply();

    // The system scheme changes (only when the user has not chosen manually)
    matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function () {
      if (!root.dataset.theme) apply();
    });
    // The mode toggle in the nav writes data-theme on <html>
    new MutationObserver(apply).observe(root, { attributeFilter: ['data-theme'] });
  })();
</script>
<noscript>
  {{ partial "shot.html" (dict "light" .light "dark" .dark "alt" $alt "eager" true) }}
</noscript>
