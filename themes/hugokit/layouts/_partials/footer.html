{{- /* Sitets footer — genbruges på forsiden og changelog-hub'en.
      Data fra forsidens footer-params (site.GetPage "/"). */}}
{{ with (site.GetPage "/").Params.footer }}
<footer class="site-footer">
  <div class="footer-inner">
    <p class="footer-made">{{ .made }}</p>
    <nav class="footer-links" aria-label="Footer">
      <a href="{{ "changelog/" | relURL }}">Changelog</a>
      <a href="{{ site.Params.githubURL }}">GitHub</a>
      <a href="mailto:{{ site.Params.feedbackEmail }}">Feedback</a>
      <a href="https://gohugo.io">gohugo.io</a>
    </nav>
  </div>
  <p class="footer-note">{{ .note }}</p>
</footer>
{{ end }}
